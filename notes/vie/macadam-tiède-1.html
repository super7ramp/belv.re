    <h1>Macadam tiède, 1</h1>
    <p class="poem"><!--
     -->École
        Cour d’école
        Écoliers
        Courent
        Caracolent
        Dans la cour
        D’école
        Et moi
        Là
        Las
        Des cours
        Des jeux
        De cour
        D’école
        Je
        Décolle
        Du macadam
        Qui colle
        Madame
        Je vole
        Je vole
        Un cliché
        De cour
        D’école
    </p>
</main>
