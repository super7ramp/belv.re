    <h1>Macadam tiède, 1</h1>
    <p class="poem"><!--
     -->École
        Cours d’école
        Écoliers
        Courent
        Caracolent
        Dans la cours
        D’école
        Et moi
        Là
        Las
        Des cours
        Des jeux
        De cours
        D’école
        Je
        Décolle
        Du macadam
        Qui colle
        Madame
        Je vole
        Je vole
        Un cliché
        De cours
        D’école
    </p>
</main>
